spring.application.name=comment-service
server.port=0
spring.config.import=optional:configserver:

spring.cloud.config.discovery.enabled=true
spring.cloud.config.discovery.service-id=config-server

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka}
eureka.instance.instance-id=${spring.application.name}:${random.value}

# Feign
feign.client.config.default.connectTimeout=3000
feign.client.config.default.readTimeout=5000
feign.circuitbreaker.enabled=true

# Resilience4j - Retry
resilience4j.retry.instances.event-service-retry.max-attempts=3
resilience4j.retry.instances.event-service-retry.wait-duration=500ms
resilience4j.retry.instances.event-service-retry.retry-exceptions=feign.FeignException$ServiceUnavailable,feign.RetryableException,java.net.SocketTimeoutException

# Resilience4j - Circuit Breaker
resilience4j.circuitbreaker.instances.event-service-cb.register-health-indicator=true
resilience4j.circuitbreaker.instances.event-service-cb.sliding-window-size=10
resilience4j.circuitbreaker.instances.event-service-cb.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.event-service-cb.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.event-service-cb.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.event-service-cb.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.event-service-cb.automatic-transition-from-open-to-half-open-enabled=true

# Resilience4j - TimeLimiter
resilience4j.timelimiter.instances.event-service-tl.timeout-duration=5s

# Actuator
management.endpoints.web.exposure.include=health,info,circuitbreakers,retrymetrics,prometheus
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true

# Logging
logging.level.ru.practicum=DEBUG
logging.level.feign=DEBUG
logging.level.io.github.resilience4j=DEBUG

# ????????? ????????? ????????? Resilience4j
resilience4j.circuitbreaker.autoconfigure.enabled=true
resilience4j.retry.autoconfigure.enabled=true
resilience4j.timelimiter.autoconfigure.enabled=true

# ????????? ??? CompletableFuture
spring.main.lazy-initialization=false