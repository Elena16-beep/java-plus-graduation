server.port=0
grpc.server.port=0

eureka.instance.metadata-map.grpcPort=${local.grpc.server.port:${grpc.server.port}}
eureka.instance.non-secure-port=${local.grpc.server.port:${grpc.server.port}}
eureka.instance.non-secure-port-enabled=true

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=analyzer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.ByteArrayDeserializer

app.kafka.topics.user-actions=stats.user-actions.v1
app.kafka.topics.events-similarity=stats.events-similarity.v1

# Spring
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:6437/analyzer
spring.datasource.username=analyzer
spring.datasource.password=analyzer
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

recommendations.neighbors=10
